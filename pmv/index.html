/* ============================== SCORE GAUGE (signature element) ============================== */
function ScoreGauge({ score = 0, size = 200 }) {
  const r = size / 2 - 14;
  const cx = size / 2, cy = size / 2;
  const startAngle = -220, endAngle = 40; // degrees, gauge arc ~260deg
  const angleFor = (v) => startAngle + (endAngle - startAngle) * (v / 100);
  const polar = (angle) => {
    const rad = (angle * Math.PI) / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  };
  const arcPath = (a0, a1) => {
    const [x0, y0] = polar(a0);
    const [x1, y1] = polar(a1);
    const large = a1 - a0 > 180 ? 1 : 0;
    return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
  };
  const cat = scoreCategory(score);
  const colorMap = { emerald: "#059669", gold: "#c8871e", ink: "#556382" };
  const stroke = colorMap[cat.color];
  return (
    <div className="relative inline-flex items-center justify-center" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <path d={arcPath(startAngle, endAngle)} fill="none" stroke="currentColor" strokeWidth="14" strokeLinecap="round" className="text-ink-100 dark:text-ink-800" />
        <path d={arcPath(startAngle, angleFor(score))} fill="none" stroke={stroke} strokeWidth="14" strokeLinecap="round" />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <span className="font-mono text-4xl font-bold text-ink-900 dark:text-white">{score}</span>
        <span className="text-[10px] uppercase tracking-widest text-ink-400 font-semibold">Índice IFR</span>
      </div>
    </div>
  );
}

function DimensionBar({ label, value }) {
  const cat = scoreCategory(value);
  const colorMap = { emerald: "bg-emerald-500", gold: "bg-gold-500", ink: "bg-ink-400" };
  return (

      <div className="h-2 rounded-full bg-ink-100 dark:bg-ink-800 overflow-hidden">
        <div className={`h-full rounded-full ${colorMap[cat.color]} transition-all duration-700`} style={{ width: `${value}%` }} />
      </div>
    </div>
  );
}

/* ============================== CRM ============================== */
function CRM({ clients, setClients, selectedId, setSelectedId }) {
  const [search, setSearch] = useState("");
  const [stageFilter, setStageFilter] = useState("all");
  const [noteText, setNoteText] = useState("");

  const filtered = clients.filter(c => {
    const q = search.toLowerCase();
    const matches = c.name.toLowerCase().includes(q) || c.owner.toLowerCase().includes(q) || c.city.toLowerCase().includes(q);
    const stageOk = stageFilter === "all" || c.stage === stageFilter;
    return matches && stageOk;
  });

  const selected = clients.find(c => c.id === selectedId) || filtered[0] || null;

  const addNote = (e) => {
    e.preventDefault();
    if (!noteText.trim() || !selected) return;
    const entry = { d: new Date().toISOString().slice(0, 10), t: noteText.trim(), k: "nota" };
    setClients(clients.map(c => c.id === selected.id ? { ...c, timeline: [...c.timeline, entry] } : c));
    setNoteText("");
  };

  const changeStage = (stageId) => {
    if (!selected) return;
    setClients(clients.map(c => c.id === selected.id ? { ...c, stage: stageId } : c));
  };

  return (
    <div className="grid lg:grid-cols-12 gap-6 fade-in items-start">
      <div className="lg:col-span-7 space-y-4">
        <Card className="p-4 flex flex-col sm:flex-row gap-3">
          <div className="relative flex-1">
            <Icon path={I.search} size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-ink-400" />
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar por marca, propietario o ciudad..."
              className="w-full pl-9 pr-3 py-2 rounded-lg border border-ink-200 dark:border-ink-700 bg-ink-50 dark:bg-ink-800 text-sm focus:outline-none focus:ring-2 focus:ring-gold-400" />
          </div>
          <select value={stageFilter} onChange={e => setStageFilter(e.target.value)} className={selectClass + " sm:w-56"}>
            <option value="all">Todas las etapas</option>
            {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
          </select>
        </Card>
        <div className="space-y-3 max-h-[600px] overflow-y-auto pr-1">
          {filtered.length === 0 && <Card className="p-10 text-center text-sm text-ink-400">No hay clientes que coincidan con la búsqueda.</Card>}
          {filtered.map(c => {
            const sm = stageMeta(c.stage);
            const active = selected && selected.id === c.id;
            return (
              <Card key={c.id} onClick={() => setSelectedId(c.id)} className={`p-4 cursor-pointer transition-all ${active ? "ring-2 ring-gold-400" : "hover:border-ink-200 dark:hover:border-ink-700"}`}>
                <div className="flex items-start justify-between gap-3">
                  <div className="min-w-0">
                    <p className="font-bold text-sm truncate">{c.name}</p>
                    <p className="text-xs text-ink-400">{c.owner} · {c.city}</p>
                  </div>
                  <Badge className={sm.color}>{sm.label}</Badge>
                </div>
                <div className="flex items-center justify-between mt-3">
                  <span className="text-[11px] text-ink-500 dark:text-ink-400">{c.industry}</span>
                  {c.score > 0 ? (
                    <span className="font-mono text-xs font-bold text-ink-700 dark:text-ink-200">IFR {c.score}</span>
                  ) : <span className="text-[11px] text-ink-300">Sin diagnóstico</span>}
                </div>
              </Card>
            );
          })}
        </div>
      </div>

      <div className="lg:col-span-5">
        {!selected ? (
          <Card className="p-10 text-center text-sm text-ink-400">Seleccioná un cliente para ver su ficha.</Card>
        ) : (
          <Card className="p-6 space-y-6 sticky top-24">
            <div>
              <div className="flex items-start justify-between gap-3">
                <div>
                  <h2 className="font-display font-bold text-lg">{selected.name}</h2>
                  <p className="text-xs text-ink-400">{selected.owner} · {selected.industry}</p>
                </div>
                {selected.score > 0 && <ScoreGauge score={selected.score} size={72} />}
              </div>
              <select value={selected.stage} onChange={e => changeStage(e.target.value)} className={selectClass + " mt-4"} aria-label="Cambiar etapa del cliente">
                {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
              </select>
              <div className="grid grid-cols-1 gap-2 mt-4 text-xs">
                <span className="flex items-center gap-2 text-ink-500 dark:text-ink-400"><Icon path={I.mail} size={14} /> {selected.email}</span>
                <span className="flex items-center gap-2 text-ink-500 dark:text-ink-400"><Icon path={I.phone} size={14} /> {selected.phone}</span>
              </div>
            </div>
            <div>
              <h3 className="text-xs font-bold uppercase tracking-widest text-ink-400 mb-3">Línea de tiempo</h3>
              <div className="space-y-3 max-h-64 overflow-y-auto pr-1 border-l-2 border-ink-100 dark:border-ink-800 pl-4">
                {selected.timeline.slice().reverse().map((t, idx) => (
                  <div key={idx} className="relative">
                    <span className="absolute -left-[21px] top-1 w-2.5 h-2.5 rounded-full bg-gold-500 border-2 border-white dark:border-ink-900" />
                    <p className="text-[10px] font-mono text-ink-400">{fmtDate(t.d)}</p>
                    <p className="text-xs text-ink-700 dark:text-ink-200 leading-relaxed">{t.t}</p>
                  </div>
                ))}
              </div>
            </div>
            <form onSubmit={addNote} className="flex gap-2">
              <input value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Agregar nota de seguimiento..."
                className="flex-1 px-3 py-2 rounded-lg border border-ink-200 dark:border-ink-700 bg-ink-50 dark:bg-ink-800 text-xs focus:outline-none focus:ring-2 focus:ring-gold-400" />
              <Button type="submit" size="sm" icon={I.send}>Añadir</Button>
            </form>
          </Card>
        )}
      </div>
    </div>
  );
}

  { key: "replicabilidad", label: "¿Qué tan replicable es el modelo sin la presencia del fundador?", dim: "escalabilidad", options: [
    ["Depende totalmente del fundador", 10], ["Depende en gran parte", 40], ["Es mayormente independiente", 75], ["Totalmente replicable con manual y capacitación", 100] ] },
  { key: "demanda", label: "Interés externo recibido en franquiciar", dim: "escalabilidad", options: [
    ["Ninguno todavía", 20], ["Consultas informales ocasionales", 50], ["Solicitudes concretas recibidas", 80], ["Lista de espera de inversores", 100] ] },
  { key: "equipo", label: "Estructura de equipo de gestión", dim: "equipo", options: [
    ["Solo el/la fundador/a", 15], ["Fundador + encargados de local", 50], ["Equipo gerencial parcial", 80], ["Equipo gerencial completo (operaciones, RRHH, marketing)", 100] ] },
  { key: "sistemas", label: "Sistemas tecnológicos de gestión implementados", dim: "equipo", options: [
    ["Ninguno / manual en papel", 15], ["Planillas y POS básico", 45], ["Software de gestión integrado", 80], ["Software + reportes en tiempo real", 100] ] },
];
const DIM_LABELS = { financiero: "Financiero", operativo: "Operativo", marca: "Marca", escalabilidad: "Escalabilidad", equipo: "Equipo de gestión" };

function Diagnostico({ clients, setClients, onSaved }) {
  const [answers, setAnswers] = useState({});
  const [businessName, setBusinessName] = useState("");
  const [ownerName, setOwnerName] = useState("");
  const [industry, setIndustry] = useState(INDUSTRIES[0]);
  const [city, setCity] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const [saved, setSaved] = useState(false);

  const answeredCount = Object.keys(answers).length;
  const progress = Math.round((answeredCount / DIAG_QUESTIONS.length) * 100);

  const results = useMemo(() => {
    const byDim = {};
    DIAG_QUESTIONS.forEach(q => {
      const v = answers[q.key];
      if (v === undefined) return;
      byDim[q.dim] = byDim[q.dim] || [];
      byDim[q.dim].push(v);
    });
    const dims = Object.keys(DIM_LABELS).map(d => {
      const vals = byDim[d] || [];
      const avg = vals.length ? Math.round(vals.reduce((a, b) => a + b, 0) / vals.length) : 0;
      return { key: d, label: DIM_LABELS[d], value: avg };
    });
    const overall = dims.length ? Math.round(dims.reduce((a, b) => a + b.value, 0) / dims.length) : 0;
    return { dims, overall };
  }, [answers]);

  const canSubmit = businessName.trim() && answeredCount === DIAG_QUESTIONS.length;

  const submit = (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    setSubmitted(true);
  };

  const saveToCRM = () => {
    const newClient = {
      id: "c" + (clients.length + 1) + "-" + Date.now(),
      name: businessName, owner: ownerName || "Sin especificar", industry, city: city || "Sin especificar",
      stage: "diagnostico", email: "-", phone: "-", score: results.overall,
      timeline: [{ d: new Date().toISOString().slice(0, 10), t: `Diagnóstico de franquiciabilidad completado — Índice ${results.overall}/100`, k: "diagnostico" }],
    };
    setClients([newClient, ...clients]);
    setSaved(true);
  };

  const reset = () => { setAnswers({}); setBusinessName(""); setOwnerName(""); setCity(""); setSubmitted(false); setSaved(false); };

  if (submitted) {
    const cat = scoreCategory(results.overall);
    const catColor = { emerald: "bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300", gold: "bg-gold-100 text-gold-800 dark:bg-gold-900/40 dark:text-gold-300", ink: "bg-ink-100 text-ink-700 dark:bg-ink-800 dark:text-ink-200" }[cat.color];
    return (
      <div className="max-w-4xl mx-auto space-y-6 fade-in">
        <Card className="p-8 text-center space-y-4">
          <p className="text-xs font-bold uppercase tracking-widest text-ink-400">Resultado del diagnóstico</p>
          <h2 className="font-display text-2xl font-bold">{businessName}</h2>
          <div className="flex justify-center py-2"><ScoreGauge score={results.overall} size={220} /></div>
          <Badge className={catColor}>{cat.label}</Badge>
          <p className="max-w-lg mx-auto text-sm text-ink-500 dark:text-ink-300">{cat.desc}</p>
        </Card>
        <Card className="p-6">
          <h3 className="font-display font-bold text-base mb-5">Desglose por dimensión</h3>
          <div className="grid sm:grid-cols-2 gap-x-8 gap-y-5">
            {results.dims.map(d => <DimensionBar key={d.key} label={d.label} value={d.value} />)}
          </div>
        </Card>
        <Card className="p-6 flex flex-col sm:flex-row items-center justify-between gap-4">
          <p className="text-sm text-ink-500 dark:text-ink-300">{saved ? "El diagnóstico se guardó en el CRM de clientes." : "Guardá este diagnóstico en el CRM para iniciar el seguimiento comercial."}</p>
          <div className="flex gap-3 shrink-0">
            <Button variant="outline" onClick={reset} icon={I.compass}>Nuevo diagnóstico</Button>
            {!saved ? <Button onClick={saveToCRM} icon={I.plus}>Guardar en CRM</Button> : <Button variant="gold" onClick={onSaved} icon={I.arrowRight}>Ver en CRM</Button>}
          </div>
        </Card>
      </div>
    );
  }

  return (
    <div className="max-w-3xl mx-auto space-y-6 fade-in">
      <Card className="p-6">
        <div className="flex items-center justify-between mb-2">
          <h2 className="font-display font-bold text-lg">Diagnóstico de Franquiciabilidad</h2>
          <span className="font-mono text-xs font-bold text-ink-400">{answeredCount}/{DIAG_QUESTIONS.length}</span>
        </div>
        <div className="h-1.5 rounded-full bg-ink-100 dark:bg-ink-800 overflow-hidden mb-1">
          <div className="h-full bg-gold-500 rounded-full transition-all duration-300" style={{ width: `${progress}%` }} />
        </div>
        <p className="text-xs text-ink-400">Complete los datos del negocio y responda las {DIAG_QUESTIONS.length} preguntas para calcular el Índice IFR.</p>
      </Card>

      <form onSubmit={submit} className="space-y-6">
        <Card className="p-6 grid sm:grid-cols-2 gap-4">
          <Field label="Nombre del negocio"><input required value={businessName} onChange={e => setBusinessName(e.target.value)} className={inputClass} placeholder="Ej: Café del Sur" /></Field>
          <Field label="Nombre del/la propietario/a"><input value={ownerName} onChange={e => setOwnerName(e.target.value)} className={inputClass} placeholder="Ej: Juan Pérez" /></Field>
          <Field label="Industria">
            <select value={industry} onChange={e => setIndustry(e.target.value)} className={selectClass}>
              {INDUSTRIES.map(i => <option key={i} value={i}>{i}</option>)}
            </select>
          </Field>
          <Field label="Ciudad"><input value={city} onChange={e => setCity(e.target.value)} className={inputClass} placeholder="Ej: Mendoza" /></Field>
        </Card>

        {["financiero", "operativo", "marca", "escalabilidad", "equipo"].map(dim => (
          <Card key={dim} className="p-6 space-y-5">
            <h3 className="font-display font-bold text-sm text-gold-700 dark:text-gold-400 uppercase tracking-wide">{DIM_LABELS[dim]}</h3>
            {DIAG_QUESTIONS.filter(q => q.dim === dim).map(q => (
              <Field key={q.key} label={q.label}>
                <div className="grid sm:grid-cols-2 gap-2">
                  {q.options.map(([label, val]) => (
                    <button type="button" key={label} onClick={() => setAnswers({ ...answers, [q.key]: val })}
                      className={`text-left px-3.5 py-2.5 rounded-lg border text-xs font-medium transition-all ${answers[q.key] === val ? "border-gold-500 bg-gold-50 dark:bg-gold-900/20 text-gold-800 dark:text-gold-300 font-bold" : "border-ink-200 dark:border-ink-700 hover:border-ink-300 dark:hover:border-ink-600"}`}>
                      {label}
                    </button>
                  ))}
                </div>
              </Field>
            ))}
          </Card>
        ))}

        <Button type="submit" size="lg" disabled={!canSubmit} className="w-full" icon={I.gauge}>Calcular Índice de Franquiciabilidad</Button>
      </form>
    </div>
  );
}

/* ============================== PORTAL DEL CLIENTE ============================== */

    { id: "mensajes", label: "Mensajes" },

    { t: "Lanzamiento comercial a inversores", done: false },

  const docs = [
    { n: "Diagnóstico_Franquiciabilidad_Completo.pdf", size: "1.4 MB" },
    { n: "Manual_de_Operaciones_Borrador.pdf", size: "3.8 MB" },
    { n: "Propuesta_Comercial_Suraci.pdf", size: "620 KB" },

  const [messages, setMessages] = useState([
    { from: "consultor", t: "¡Hola! Ya tenemos los resultados de tu diagnóstico. Te propongo coordinar una llamada esta semana para revisar el plan de expansión.", d: "2026-07-08" },
    { from: "cliente", t: "Perfecto, el jueves a las 15hs me queda cómodo. Gracias!", d: "2026-07-08" },
  ]);

  const send = (e) => { e.preventDefault(); if (!draft.trim()) return; setMessages([...messages, { from: "cliente", t: draft.trim(), d: new Date().toISOString().slice(0, 10) }]); setDraft(""); };

  if (!client) return <Card className="p-10 text-center text-sm text-ink-400">Aún no hay clientes con diagnóstico guardado. Completá uno en la sección Diagnóstico.</Card>;

  return (
    <div className="space-y-6 fade-in">
      <Card className="p-4 flex flex-col sm:flex-row sm:items-center gap-3 justify-between">
        <div className="flex items-center gap-3">
          <span className="text-xs font-semibold text-ink-400">Vista simulada del portal para:</span>
          <select value={clientId} onChange={e => setClientId(e.target.value)} className={selectClass + " w-auto"}>
            {clientOptions.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <Badge className={stageMeta(client.stage).color}>{stageMeta(client.stage).label}</Badge>
      </Card>

      <div className="flex gap-1 border-b border-ink-100 dark:border-ink-800 overflow-x-auto">
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} className={`px-4 py-3 text-sm font-semibold whitespace-nowrap border-b-2 transition-colors ${tab === t.id ? "border-gold-500 text-ink-900 dark:text-white" : "border-transparent text-ink-400 hover:text-ink-700 dark:hover:text-ink-200"}`}>{t.label}</button>
        ))}
      </div>

      {tab === "resumen" && (
        <div className="grid lg:grid-cols-12 gap-6">
          <Card className="lg:col-span-5 p-6 flex flex-col items-center gap-4">
            <p className="text-xs font-bold uppercase tracking-widest text-ink-400">Tu Índice de Franquiciabilidad</p>
            <ScoreGauge score={client.score || 0} size={190} />
            <p className="text-sm text-center text-ink-500 dark:text-ink-300">{scoreCategory(client.score || 0).desc}</p>
          </Card>
          <Card className="lg:col-span-7 p-6">
            <h3 className="font-display font-bold text-base mb-4">Próximos pasos recomendados</h3>
            <ul className="space-y-3">
              {roadmap.slice(0, 3).map(r => (
                <li key={r.t} className="flex items-center gap-3 text-sm">
                  <Icon path={r.done ? I.checkCircle : I.clock} size={18} className={r.done ? "text-emerald-600" : "text-ink-300"} />

            <div className="mt-6 p-4 rounded-xl bg-gold-50 dark:bg-gold-900/20 border border-gold-100 dark:border-gold-800 flex items-center gap-3">
              <Icon path={I.spark} size={20} className="text-gold-600 dark:text-gold-400 shrink-0" />
              <p className="text-xs text-gold-800 dark:text-gold-300">Tu consultor asignado es <strong>Lic. Luis Grasso</strong>. Coordiná dudas desde la pestaña Mensajes.</p>
            </div>
          </Card>
        </div>
      )}

      {tab === "hoja" && (
        <Card className="p-6">
          <h3 className="font-display font-bold text-base mb-6">Hoja de ruta de expansión</h3>
          <div className="space-y-4 border-l-2 border-ink-100 dark:border-ink-800 pl-6">

              <div key={r.t} className="relative">

      {tab === "docs" && (
        <Card className="p-6">
          <h3 className="font-display font-bold text-base mb-5">Documentos compartidos</h3>
          <div className="space-y-2.5">
            {docs.map(d => (
              <div key={d.n} className="flex items-center justify-between p-3.5 border border-ink-100 dark:border-ink-800 rounded-xl hover:bg-ink-50 dark:hover:bg-ink-800/50 transition-colors">
                <div className="flex items-center gap-3 min-w-0">
                  <Icon path={I.doc} size={18} className="text-gold-600 dark:text-gold-400 shrink-0" />
                  <div className="min-w-0">
                    <p className="text-xs font-semibold truncate">{d.n}</p>
                    <p className="text-[10px] text-ink-400">{d.size}</p>
                  </div>
                </div>
                <Button size="sm" variant="ghost">Descargar</Button>

            ))}
          </div>

      )}

      {tab === "mensajes" && (
        <Card className="p-0 overflow-hidden flex flex-col h-[420px]">
          <div className="flex-1 overflow-y-auto p-5 space-y-3">
            {messages.map((m, idx) => (
              <div key={idx} className={`max-w-[75%] ${m.from === "cliente" ? "ml-auto" : ""}`}>
                <div className={`p-3 rounded-2xl text-xs leading-relaxed ${m.from === "cliente" ? "bg-ink-900 text-white dark:bg-gold-500 dark:text-ink-950" : "bg-ink-100 dark:bg-ink-800"}`}>{m.t}</div>

            <Button type="submit" size="sm" icon={I.send}>Enviar</Button>
          </form>
        </Card>
      )}
    </div>
  );
}

/* ============================== CENTRO DE IA ============================== */
function botReply(text) {
  const t = text.toLowerCase();
  if (t.includes("ifr") || t.includes("índice") || t.includes("indice") || t.includes("franquiciab"))
    return "El Índice de Franquiciabilidad (IFR) combina cinco dimensiones —financiero, operativo, marca, escalabilidad y equipo— en un puntaje de 0 a 100. Un negocio con IFR ≥75 suele estar listo para iniciar el proceso; entre 50 y 74 requiere fortalecer procesos antes de escalar.";
  if (t.includes("manual") || t.includes("proceso"))
    return "El manual de operaciones es el documento base para franquiciar: estandariza apertura, atención, control de calidad y cierre de cada local. Suraci lo redacta junto al equipo del cliente durante la etapa de acompañamiento comercial.";
  if (t.includes("regalía") || t.includes("regalia") || t.includes("costo") || t.includes("precio"))
    return "La estructura habitual de regalías que recomendamos a nuestros clientes ronda el 5% del neto facturado mensualmente, más un canon de ingreso inicial que varía según la marca y la inversión requerida por local.";
  if (t.includes("cliente") || t.includes("crm"))
    return "Podés ver el estado comercial de cada marca en el módulo CRM de Clientes: etapa del embudo, línea de tiempo de interacciones y notas de seguimiento. Desde ahí también podés cambiar la etapa de negociación.";
  if (t.includes("hola") || t.includes("buenas"))
    return "¡Hola! Soy el asistente de Suraci Consulting. Puedo ayudarte con dudas sobre el Índice IFR, la metodología de diagnóstico, el CRM de clientes o el proceso de expansión de franquicias.";
  return "Entiendo tu consulta. Te recomiendo revisar el módulo de Diagnóstico para calcular el Índice IFR de un negocio, o el CRM de Clientes para ver el estado comercial de una marca en particular.";
}

function CentroIA() {
  const [messages, setMessages] = useState([
    { from: "bot", t: "¡Hola! Soy el asistente de Suraci Consulting. Preguntame sobre el Índice IFR, la metodología de diagnóstico o el proceso de expansión de franquicias." },
  ]);
  const [draft, setDraft] = useState("");
  const [typing, setTyping] = useState(false);
  const scrollRef = useRef(null);
  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages, typing]);

  const send = (e, preset) => {
    if (e) e.preventDefault();
    const text = (preset || draft).trim();
    if (!text) return;
    setMessages(m => [...m, { from: "user", t: text }]);
    setDraft("");
    setTyping(true);
    setTimeout(() => { setTyping(false); setMessages(m => [...m, { from: "bot", t: botReply(text) }]); }, 800);
  };

  const suggestions = ["¿Cómo se calcula el Índice IFR?", "¿Qué es el manual de operaciones?", "¿Cuánto cobramos de regalías?", "¿Dónde veo el estado de un cliente?"];

  return (
    <div className="grid lg:grid-cols-12 gap-6 fade-in h-[calc(100vh-160px)]">
      <Card className="lg:col-span-8 flex flex-col overflow-hidden">
        <div ref={scrollRef} className="flex-1 overflow-y-auto p-5 space-y-4">
          {messages.map((m, idx) => {
            const bot = m.from === "bot";
            return (
              <div key={idx} className={`flex gap-3 max-w-[85%] ${bot ? "" : "ml-auto flex-row-reverse"}`}>
                <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${bot ? "bg-gold-50 text-gold-700 dark:bg-gold-900/30 dark:text-gold-300" : "bg-ink-900 text-white dark:bg-ink-700"}`}>
                  <Icon path={bot ? I.bot : I.users} size={14} />
                </div>
                <div className={`p-3.5 rounded-2xl text-xs leading-relaxed ${bot ? "bg-ink-50 dark:bg-ink-800" : "bg-ink-900 text-white dark:bg-gold-500 dark:text-ink-950"}`}>{m.t}</div>
              </div>
            );
          })}
          {typing && (
            <div className="flex gap-3 max-w-[85%]">
              <div className="w-8 h-8 rounded-full bg-gold-50 dark:bg-gold-900/30 text-gold-700 dark:text-gold-300 flex items-center justify-center"><Icon path={I.bot} size={14} /></div>
              <div className="p-3.5 rounded-2xl bg-ink-50 dark:bg-ink-800 text-xs text-ink-400 flex gap-1">
                <span className="w-1.5 h-1.5 bg-ink-400 rounded-full animate-bounce" />
                <span className="w-1.5 h-1.5 bg-ink-400 rounded-full animate-bounce" style={{ animationDelay: ".1s" }} />
                <span className="w-1.5 h-1.5 bg-ink-400 rounded-full animate-bounce" style={{ animationDelay: ".2s" }} />
              </div>
            </div>
          )}
        </div>
        <form onSubmit={send} className="p-4 border-t border-ink-100 dark:border-ink-800 flex gap-2">
          <input value={draft} onChange={e => setDraft(e.target.value)} placeholder="Preguntá algo sobre franquicias, diagnóstico o el CRM..."
            className="flex-1 px-4 py-2.5 rounded-xl border border-ink-200 dark:border-ink-700 bg-ink-50 dark:bg-ink-800 text-xs focus:outline-none focus:ring-2 focus:ring-gold-400" />
          <Button type="submit" icon={I.send} disabled={!draft.trim()}>Enviar</Button>
        </form>
      </Card>
      <Card className="lg:col-span-4 p-5 space-y-4 h-fit">
        <h3 className="text-xs font-bold uppercase tracking-widest text-ink-400">Preguntas frecuentes</h3>
        <div className="space-y-2">
          {suggestions.map(s => (
            <button key={s} onClick={() => send(null, s)} className="w-full text-left p-3 rounded-xl border border-ink-100 dark:border-ink-800 text-xs font-semibold hover:border-gold-300 dark:hover:border-gold-700 hover:bg-gold-50/50 dark:hover:bg-gold-900/10 transition-all flex items-center justify-between group">
              <span>{s}</span><Icon path={I.arrowRight} size={13} className="text-ink-300 group-hover:text-gold-600 group-hover:translate-x-0.5 transition-all shrink-0" />
            </button>
          ))}
        </div>
        <div className="p-3.5 rounded-xl bg-ink-50 dark:bg-ink-800 text-[10px] text-ink-400 leading-relaxed">
          Este asistente funciona con respuestas de demostración locales. En producción se conecta a la base de manuales y contratos de Suraci.
        </div>
      </Card>
    </div>
  );
}

/* ============================== ROOT APP ============================== */
function App() {
  const [view, setView] = useState("landing"); // landing | app
  const [page, setPage] = useState("dashboard");
  const [dark, setDark] = useState(false);
  const [clients, setClients] = useState(seedClients);
  const [selectedId, setSelectedId] = useState(seedClients[0].id);

  useEffect(() => { document.documentElement.classList.toggle("dark", dark); }, [dark]);

  if (view === "landing") return <Landing onEnter={() => { setView("app"); setPage("dashboard"); }} />;

  return (
    <AppShell page={page} setPage={setPage} dark={dark} setDark={setDark} onExit={() => setView("landing")}>
      {page === "dashboard" && <Dashboard clients={clients} setPage={setPage} />}
      {page === "crm" && <CRM clients={clients} setClients={setClients} selectedId={selectedId} setSelectedId={setSelectedId} />}
      {page === "diagnostico" && <Diagnostico clients={clients} setClients={setClients} onSaved={() => setPage("crm")} />}
      {page === "portal" && <PortalCliente clients={clients} />}
      {page === "ia" && <CentroIA />}
    </AppShell>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
